<!DOCTYPE html>
<html>
<head>
    <title>Editar Producto - DJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow border-primary" style="max-width: 500px; margin: auto;">
            <div class="card-header bg-primary text-white">
                <h3>Editar Producto</h3>
            </div>
            <div class="card-body">
                <form action="/ejecutar_actualizar" method="POST">
                    <input type="hidden" name="txtID" value="{{ p.id_polera }}">

                    <div class="mb-3">
                        <label class="form-label">Descripción:</label>
                        <input type="text" name="txtDescripcion" class="form-control" value="{{ p.descripcion }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Talla:</label>
                        <select name="txtTalla" class="form-select">
                            <option value="S" {{ 'selected' if p.talla == 'S' }}>S</option>
                            <option value="M" {{ 'selected' if p.talla == 'M' }}>M</option>
                            <option value="L" {{ 'selected' if p.talla == 'L' }}>L</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio (Bs):</label>
                        <input type="number" step="0.01" name="txtPrecio" class="form-control" value="{{ p.precio }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Stock:</label>
                        <input type="number" name="txtStock" class="form-control" value="{{ p.stock }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Marca:</label>
                        <select name="txtMarca" class="form-select">
                            {% for m in marcas %}
                                <option value="{{ m.id_marca }}" {{ 'selected' if m.id_marca == p.id_marca }}>
                                    {{ m.nombre_marca }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        <a href="/" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
