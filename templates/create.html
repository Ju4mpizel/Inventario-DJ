<!DOCTYPE html>
<html>
<head>
    <title>Agregar Polera - DJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow" style="max-width: 500px; margin: auto;">
            <div class="card-header bg-success text-white">
                <h3>Nueva Polera</h3>
            </div>
            <div class="card-body">
                <form action="/guardar_polera" method="POST">
                    
                    <div class="mb-3">
                        <label>Descripción:</label>
                        <input type="text" name="txtDescripcion" class="form-control" placeholder="Ej: Sport2026Especial" required>
                    </div>

                    <div class="mb-3">
                        <label>Talla:</label>
                        <select name="txtTalla" class="form-select">
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Precio (Bs):</label>
                        <input type="number" step="0.01" name="txtPrecio" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Stock inicial:</label>
                        <input type="number" name="txtStock" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Marca:</label>
                        <select name="txtMarca" class="form-select">
                            {% for m in marcas %}
                                <option value="{{ m.id_marca }}">{{ m.nombre_marca }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Guardar Polera</button>
                        <a href="/" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
