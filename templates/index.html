<!DOCTYPE html>
<html>
<head>
    <title>Tienda DJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex align-items-center gap-3 mb-3">
        <img src="{{ url_for('static', filename='img/LogoDJ.png') }}" 
             alt="Logo DJ" 
             style="height: 100px; width: auto;">
        
        <h1 class="mb-0">Inventario DJ</h1>
        </div>

        <div class="d-flex align-items-center gap-3 mb-4">
    
            <a href="/agregar" class="btn btn-success">
            <i class="bi bi-plus-lg"></i> Agregar Producto
            </a>

    <div class="vr"></div>

    <div class="btn-group" role="group">
        <a href="{{ '/' if talla_activa == 'S' else '/?talla=S' }}" 
           class="btn {{ 'btn-primary' if talla_activa == 'S' else 'btn-outline-primary' }}">S</a>
        
        <a href="{{ '/' if talla_activa == 'M' else '/?talla=M' }}" 
           class="btn {{ 'btn-primary' if talla_activa == 'M' else 'btn-outline-primary' }}">M</a>
        
        <a href="{{ '/' if talla_activa == 'L' else '/?talla=L' }}" 
           class="btn {{ 'btn-primary' if talla_activa == 'L' else 'btn-outline-primary' }}">L</a>
    </div>
    <div class="ms-2 d-flex gap-2">
    {% for m in marcas %}
        <a href="{{ '/' if marca_activa == m.id_marca|string else '/?marca=' ~ m.id_marca }}" 
           class="btn {{ 'btn-primary' if marca_activa == m.id_marca|string else 'btn-outline-primary' }} btn-sm">
            <i class="bi bi-tag-fill"></i> {{ m.nombre_marca }}
        </a>
    {% endfor %}
    </div>
    </div>

        <hr>
        <table class="table border">
            <thead class="table-dark">
                <tr>
                    <th>Descripción</th>
                    <th>Talla</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Marca</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for p in poleras %}
                <tr>
                    <td>{{ p.descripcion }}</td>
                    <td>{{ p.talla }}</td>
                    <td>{{ p.precio }} Bs</td>
                    <td>{{ p.stock }}</td>
                    <td>{{ p.nombre_marca }}</td>
                    <td>
                        <div class="btn-group" role="group">
                            <a href="/editar/{{ p.id_polera }}" class="btn btn-primary btn-sm">Editar</a>
        
                            <a href="/confirmar_eliminar/{{ p.id_polera }}" class="btn btn-danger btn-sm">Eliminar</a>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
