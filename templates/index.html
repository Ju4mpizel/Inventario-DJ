<!DOCTYPE html>
<html>
<head>
    <title>Tienda DJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Inventario DJ</h1>

        <div class="d-flex align-items-center gap-3 mb-4">
    
            <a href="/agregar" class="btn btn-success">
            <i class="bi bi-plus-lg"></i> + Agregar Producto
            </a>

    <div class="vr"></div>

    <div class="btn-group" role="group">
        <a href="{{ '/' if talla_activa == 'S' else '/?talla=S' }}" 
           class="btn {{ 'btn-primary' if talla_activa == 'S' else 'btn-outline-primary' }}">S</a>
        
        <a href="{{ '/' if talla_activa == 'M' else '/?talla=M' }}" 
           class="btn {{ 'btn-primary' if talla_activa == 'M' else 'btn-outline-primary' }}">M</a>
        
        <a href="{{ '/' if talla_activa == 'L' else '/?talla=L' }}" 
           class="btn {{ 'btn-primary' if talla_activa == 'L' else 'btn-outline-primary' }}">L</a>
    </div>

    <div class="ms-2">
        {% for m in marcas %}
            <a href="/?marca={{ m.id_marca }}" class="btn btn-outline-dark btn-sm">{{ m.nombre_marca }}</a>
        {% endfor %}
    </div>
    </div>

        <hr>
        <table class="table border">
            <thead class="table-dark">
                <tr>
                    <th>Descripción</th>
                    <th>Talla</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Marca</th>
                </tr>
            </thead>
            <tbody>
                {% for p in poleras %}
                <tr>
                    <td>{{ p.descripcion }}</td>
                    <td>{{ p.talla }}</td>
                    <td>{{ p.precio }} Bs</td>
                    <td>{{ p.stock }}</td>
                    <td>{{ p.nombre_marca }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
