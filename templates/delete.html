<!DOCTYPE html>
<html>
<head>
    <title>Eliminar Producto - DJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow border-danger" style="max-width: 500px; margin: auto;">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">¿Desea eliminar este producto?</h3>
            </div>
            <div class="card-body">
                <p><strong>Descripción:</strong> {{ p.descripcion }}</p>
                <p><strong>Talla:</strong> {{ p.talla }}</p>
                <p><strong>Marca:</strong> {{ p.nombre_marca }}</p>
                <p><strong>Precio:</strong> {{ p.precio }} Bs</p>
                
                <hr>
                <div class="alert danger-warning">
                    Esta acción es permanente y no se puede deshacer.
                </div>

                <form action="/ejecutar_eliminar" method="POST">
                    <input type="hidden" name="txtID" value="{{ p.id_polera }}">
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger">Eliminar</button>
                        <a href="/" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
